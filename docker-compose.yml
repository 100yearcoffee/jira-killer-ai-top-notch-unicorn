services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  go-api:
    build:
      context: ./go-api
    environment:
      DATABASE_URL: postgres://tasks_user:tasks_password@postgres:5432/tasks
      PORT: "8080"
      NATS_URL: nats://nats:4222
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - nats

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

  python-worker:
    build:
      context: ./python-worker
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgres://tasks_user:tasks_password@postgres:5432/tasks
      NATS_URL: nats://nats:4222
    depends_on:
      - postgres
      - nats

  rust-worker:
    build:
      context: ./rust-worker
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://tasks_user:tasks_password@postgres:5432/tasks
    depends_on:
      - nats
      - postgres

volumes:
  postgres_data:

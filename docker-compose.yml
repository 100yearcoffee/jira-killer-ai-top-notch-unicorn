services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  go-api:
    build:
      context: ./go-api
    environment:
      DATABASE_URL: postgres://tasks_user:tasks_password@postgres:5432/tasks
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
